<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="উদ্ভিদ গোয়েন্দা (Plant Detective) — Learn to identify crop problems using the CABI 5-step diagnostic process. Interactive games, AI diagnosis, and Bengali TTS accessibility for Bangladesh farmers." />
    <meta name="keywords" content="CABI, Plantwise, Bangladesh, crop diagnosis, pest, disease, agriculture, উদ্ভিদ গোয়েন্দা, DAE, BRRI, BARI" />

    <!-- Prevent ALL browser caching for this shell HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <meta name="theme-color" content="#006028" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="উদ্ভিদ গোয়েন্দা" />

    <title>স্মার্ট ফসল রোগ নির্ণয় | CABI Smart Crop Diagnosis</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/cabi-logo.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker — force update on every page load
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          const registration = await navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' });
          // Check for SW updates every time the page loads
          registration.update();
          // Also check every 60 seconds while app is open
          setInterval(() => registration.update(), 60000);
        });
      }
    </script>
  </body>
</html>
